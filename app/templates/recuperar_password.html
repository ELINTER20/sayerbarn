{% extends 'base_auth.html' %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<main class="w-full max-w-md mx-auto">

    <h2 class="text-2xl font-bold mb-4">
        Recuperar contraseña
    </h2>

    {% if error %}
    <div class="bg-error-container text-on-error-container font-body-md text-body-md px-4 py-3 rounded-lg mb-4">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="bg-emerald-100 text-emerald-900 font-body-md text-body-md px-4 py-3 rounded-lg mb-4">{{ success }}</div>
    {% endif %}
    {% if reset_link %}
    <div class="mb-4 p-4 rounded bg-surface-container-high text-on-surface">
        <p class="font-label-sm text-label-sm mb-2">Enlace directo de prueba:</p>
        <a class="text-primary break-all" href="{{ reset_link }}">{{ reset_link }}</a>
    </div>
    {% endif %}

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Ingresa tu correo"
            required
            value="{{ request.form.email|default('') }}"
            class="w-full border p-3 rounded mb-4">

        <button
            type="submit"
            class="w-full bg-blue-600 text-white p-3 rounded">

            Enviar

        </button>

    </form>

</main>
{% endblock %}
