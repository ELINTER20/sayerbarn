<!--
  Chatbot de navegación (flujo de opciones, sin IA).
  Botón flotante presente en todas las páginas públicas — se incluye
  únicamente desde base.html. No tiene relación con el asesor de IA
  de productos (ese vive en /api/chat y en la página de Asesoría).
-->
<div id="navbot-wrap">

  <!-- Botón flotante: en móvil va más arriba para no tapar la barra de navegación inferior -->
  <button onclick="_navbot.toggle()" title="¿Necesitas ayuda?"
    class="fixed bottom-24 md:bottom-6 right-6 z-[200] w-14 h-14 bg-primary text-on-primary rounded-full shadow-lg border-2 border-white flex items-center justify-center btn-lift">
    <span id="navbot-icon" class="material-symbols-outlined text-[26px]" style="font-variation-settings:'FILL' 1;">support_agent</span>
  </button>

  <!-- Ventana del chat -->
  <div id="navbot-window"
    class="hidden fixed bottom-[168px] md:bottom-24 right-6 z-[200] w-96 max-w-[calc(100vw-2rem)] bg-surface-container-lowest rounded-xl shadow-xl border border-outline-variant flex flex-col overflow-hidden"
    style="max-height:480px">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 bg-primary flex-shrink-0">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-on-primary text-[22px]" style="font-variation-settings:'FILL' 1;">support_agent</span>
        <span class="text-base font-semibold text-on-primary">Ayuda para navegar</span>
      </div>
      <button onclick="_navbot.toggle()" class="text-on-primary/70 hover:text-on-primary transition-colors p-1 rounded">
        <span class="material-symbols-outlined text-[22px]">close</span>
      </button>
    </div>

    <!-- Mensajes -->
    <div id="navbot-msgs" class="flex-1 overflow-y-auto p-4 space-y-3" style="min-height:220px"></div>

    <!-- Input de código postal (solo visible en el paso de buscar tienda) -->
    <div id="navbot-cp-box" class="hidden flex-shrink-0 px-4 pb-4 pt-1 border-t border-outline-variant bg-surface-container-lowest">
      <div class="flex gap-2">
        <input id="navbot-cp-field" type="text" inputmode="numeric" maxlength="5"
          placeholder="Código postal (5 dígitos)"
          class="flex-1 border border-outline-variant rounded-lg px-3 py-2.5 text-base bg-surface text-on-surface focus:outline-none focus:border-primary transition-colors" />
        <button onclick="_navbot.buscarTienda()"
          class="bg-primary text-on-primary px-4 py-2.5 rounded-lg text-base font-semibold hover:opacity-90 transition-opacity flex-shrink-0">
          Buscar
        </button>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  var abierto = false;
  var tiendas = [];

  fetch('/api/tiendas')
    .then(function (r) { return r.json(); })
    .then(function (data) { tiendas = data; })
    .catch(function () { tiendas = []; });

  var RUTAS = {
    catalogo:  "{{ url_for('public.catalogo') }}",
    asesoria:  "{{ url_for('public.asesoria') }}",
    carrito:   "{{ url_for('public.carrito') }}",
    pedidos:   "{{ url_for('pedidos.mis_pedidos') }}",
    favoritos: "{{ url_for('usuario.favoritos') }}",
  };

  /* ── Árbol de conversación ────────────────────────────────
     Cada paso es o bien una lista de opciones (botones), o el
     paso especial "cp" que muestra el input de código postal. */
  var PASOS = {
    menu: {
      mensaje: '¡Hola! Soy el asistente de navegación de SayerBarn 👋 ¿En qué te ayudo?',
      opciones: [
        { texto: '¿Necesitas ayuda para navegar la página?', ir: 'navegar' },
        { texto: '¿Quieres encontrar la tienda más cercana?', ir: 'cp' },
        { texto: '¿Necesitas hacer una devolución?', ir: 'devolucion' },
      ]
    },
    navegar: {
      mensaje: 'Claro, ¿qué estás buscando?',
      opciones: [
        { texto: 'Ver el catálogo de productos', url: RUTAS.catalogo },
        { texto: 'Cómo hacer un pedido', ir: 'ayuda_pedido' },
        { texto: 'Ver mi historial de pedidos', url: RUTAS.pedidos },
        { texto: 'Ver mis productos favoritos', url: RUTAS.favoritos },
        { texto: '← Regresar al menú', ir: 'menu' },
      ]
    },
    ayuda_pedido: {
      mensaje: 'Para hacer un pedido:\n1. Entra al Catálogo y elige un producto.\n2. Da clic en "Agregar al carrito".\n3. Abre tu carrito (ícono 🛒 arriba) y confirma la compra.',
      opciones: [
        { texto: 'Ir al catálogo', url: RUTAS.catalogo },
        { texto: 'Ir a mi carrito', url: RUTAS.carrito },
        { texto: '← Regresar al menú', ir: 'menu' },
      ]
    },
    cp: {
      mensaje: 'Escribe tu código postal de 5 dígitos y te digo qué sucursal te queda más cerca.',
      esperaCp: true
    },
    devolucion: {
      mensaje: 'Para una devolución necesito saber si ya tienes tu número de pedido a la mano.',
      opciones: [
        { texto: 'Sí, ya lo tengo', ir: 'devolucion_con_numero' },
        { texto: 'No, necesito buscarlo', ir: 'devolucion_sin_numero' },
        { texto: '← Regresar al menú', ir: 'menu' },
      ]
    },
    devolucion_con_numero: {
      mensaje: 'Perfecto. Contáctanos con tu número de pedido para iniciar la devolución:\n📞 800 123 4567\n✉ contacto@sayerdabet.com\n\nTe respondemos en menos de 24 horas hábiles.',
      opciones: [
        { texto: '← Regresar al menú', ir: 'menu' },
      ]
    },
    devolucion_sin_numero: {
      mensaje: 'Sin problema, puedes encontrar tu número de pedido en la sección "Mis pedidos".',
      opciones: [
        { texto: 'Ir a Mis pedidos', url: RUTAS.pedidos },
        { texto: '← Regresar al menú', ir: 'menu' },
      ]
    },
  };

  /* ── Helpers de DOM ───────────────────────────────────── */
  function contenedorMsgs() { return document.getElementById('navbot-msgs'); }
  function cajaCp()         { return document.getElementById('navbot-cp-box'); }
  function bajarScroll()    { var c = contenedorMsgs(); if (c) c.scrollTop = c.scrollHeight; }

  function burbujaBot(html) {
    var fila = document.createElement('div');
    fila.className = 'flex gap-2 items-start';
    fila.innerHTML =
      '<span class="material-symbols-outlined text-primary text-[20px] mt-1 flex-shrink-0" style="font-variation-settings:\'FILL\' 1;">smart_toy</span>' +
      '<div class="max-w-[270px] space-y-2">' + html + '</div>';
    contenedorMsgs().appendChild(fila);
    bajarScroll();
  }

  function burbujaUsuario(texto) {
    var fila = document.createElement('div');
    fila.className = 'flex justify-end';
    fila.innerHTML = '<div class="bg-primary text-on-primary rounded-lg px-3 py-2 text-base max-w-[250px] leading-snug">' + texto + '</div>';
    contenedorMsgs().appendChild(fila);
    bajarScroll();
  }

  function textoAHtml(texto) {
    return (texto || '').replace(/\n/g, '<br>');
  }

  /* ── Motor de flujo ───────────────────────────────────── */
  function irAPaso(nombrePaso) {
    var paso = PASOS[nombrePaso];
    if (!paso) return;

    cajaCp().classList.add('hidden');

    burbujaBot('<div class="bg-surface-container rounded-lg px-3 py-2 text-base text-on-surface leading-snug">' + textoAHtml(paso.mensaje) + '</div>');

    if (paso.esperaCp) {
      cajaCp().classList.remove('hidden');
      document.getElementById('navbot-cp-field').value = '';
      setTimeout(function () { document.getElementById('navbot-cp-field').focus(); }, 60);
      return;
    }

    if (!paso.opciones || !paso.opciones.length) return;

    var grupo = document.createElement('div');
    grupo.className = 'flex flex-col gap-1';

    paso.opciones.forEach(function (opcion) {
      var boton = document.createElement('button');
      boton.className = 'text-left text-sm px-3 py-2 rounded-lg border border-primary/40 text-primary hover:bg-primary/10 transition-colors w-full leading-snug';
      boton.textContent = opcion.texto;
      boton.addEventListener('click', function () {
        grupo.querySelectorAll('button').forEach(function (b) {
          b.disabled = true;
          b.classList.add('opacity-40', 'cursor-default');
        });
        if (opcion.url) {
          window.location.href = opcion.url;
          return;
        }
        burbujaUsuario(opcion.texto);
        setTimeout(function () { irAPaso(opcion.ir); }, 300);
      });
      grupo.appendChild(boton);
    });

    contenedorMsgs().appendChild(grupo);
    bajarScroll();
  }

  /* ── Buscador de tienda por código postal ────────────────
     Compara los primeros 2 dígitos del CP (estado) contra cada
     tienda. Dentro del mismo estado, se queda con la(s) de CP
     numéricamente más cercano. Si ninguna tienda está en el
     mismo estado, muestra todas para que el usuario elija. */
  function buscarTiendaPorCp(cp) {
    var cpNum = parseInt(cp, 10);
    var prefijo = cp.substring(0, 2);

    var mismoEstado = tiendas.filter(function (t) {
      return t.cp.substring(0, 2) === prefijo;
    });

    if (mismoEstado.length === 0) {
      return { lista: tiendas, titulo: 'No tenemos sucursal en tu estado. Aquí están todas nuestras sucursales:' };
    }

    var distanciaMin = Infinity;
    mismoEstado.forEach(function (t) {
      var d = Math.abs(parseInt(t.cp, 10) - cpNum);
      if (d < distanciaMin) distanciaMin = d;
    });
    var masCercanas = mismoEstado.filter(function (t) {
      return Math.abs(parseInt(t.cp, 10) - cpNum) === distanciaMin;
    });

    return {
      lista: masCercanas,
      titulo: masCercanas.length === 1
        ? 'La sucursal más cercana a tu código postal es:'
        : 'Estas son tus sucursales más cercanas:'
    };
  }

  function tarjetaTienda(t) {
    return '<div class="bg-surface-container-low rounded-lg px-3 py-2.5 text-sm border border-outline-variant space-y-1">' +
      '<p class="font-semibold text-on-surface text-base">' + t.nombre + '</p>' +
      '<p class="text-on-surface-variant">' + t.direccion + '</p>' +
      '<p class="text-on-surface-variant">CP ' + t.cp + '</p>' +
      '<p class="text-primary mt-1">💬 WhatsApp: ' + t.whatsapp + '</p>' +
      '<p class="text-on-surface-variant text-xs">📞 Fijo: ' + t.telefono + '</p>' +
      '<p class="text-on-surface-variant text-xs">' + t.horario + '</p>' +
    '</div>';
  }

  function buscarTienda() {
    var campo = document.getElementById('navbot-cp-field');
    var cp = (campo.value || '').trim();

    if (!/^\d{5}$/.test(cp)) {
      campo.style.borderColor = '#ba1a1a';
      campo.focus();
      return;
    }
    campo.style.borderColor = '';
    cajaCp().classList.add('hidden');
    burbujaUsuario('Mi CP es ' + cp);

    var resultado = buscarTiendaPorCp(cp);
    var html = '<div class="bg-surface-container rounded-lg px-3 py-2 text-base text-on-surface">' + resultado.titulo + '</div>';
    resultado.lista.forEach(function (t) { html += tarjetaTienda(t); });
    html += '<button id="navbot-volver-cp" class="text-sm text-primary hover:underline">← Regresar al menú</button>';

    burbujaBot(html);

    var botonVolver = document.getElementById('navbot-volver-cp');
    if (botonVolver) botonVolver.addEventListener('click', function () { irAPaso('menu'); });
    bajarScroll();
  }

  /* ── Abrir / cerrar ───────────────────────────────────── */
  function toggle() {
    abierto = !abierto;
    var ventana = document.getElementById('navbot-window');
    var icono = document.getElementById('navbot-icon');
    if (abierto) {
      ventana.classList.remove('hidden');
      icono.textContent = 'close';
      icono.style.fontVariationSettings = "'FILL' 0";
      if (!contenedorMsgs().hasChildNodes()) irAPaso('menu');
    } else {
      ventana.classList.add('hidden');
      icono.textContent = 'support_agent';
      icono.style.fontVariationSettings = "'FILL' 1";
    }
  }

  window._navbot = { toggle: toggle, buscarTienda: buscarTienda };

  document.addEventListener('DOMContentLoaded', function () {
    var campo = document.getElementById('navbot-cp-field');
    if (campo) {
      campo.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') buscarTienda();
      });
    }
  });
})();
</script>
