<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SayerBarn - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Manrope:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f8f9fa",
                        "primary-fixed-dim": "#b6c4ff",
                        "tertiary-fixed": "#dee3ed",
                        "secondary-fixed": "#dce1ff",
                        "tertiary-fixed-dim": "#c1c7d0",
                        "on-error-container": "#93000a",
                        "on-background": "#191c1d",
                        "background": "#f8f9fa",
                        "on-tertiary-fixed-variant": "#41474f",
                        "surface-dim": "#d9dadb",
                        "on-secondary-container": "#283e88",
                        "on-secondary-fixed-variant": "#2b418c",
                        "surface-container-low": "#f3f4f5",
                        "on-surface-variant": "#444653",
                        "on-primary-fixed": "#001550",
                        "primary-fixed": "#dce1ff",
                        "on-primary-container": "#8ea6ff",
                        "tertiary-container": "#393f47",
                        "on-secondary-fixed": "#001550",
                        "surface-container": "#edeeef",
                        "primary-container": "#0033a0",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#b6c4ff",
                        "on-surface": "#191c1d",
                        "surface-container-high": "#e7e8e9",
                        "secondary-container": "#98adfe",
                        "outline-variant": "#c4c5d5",
                        "primary": "#00216e",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#3456c1",
                        "tertiary": "#232930",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#133ca8",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#b6c4ff",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e1e3e4",
                        "surface": "#f8f9fa",
                        "on-tertiary-fixed": "#161c23",
                        "surface-variant": "#e1e3e4",
                        "on-primary": "#ffffff",
                        "outline": "#747684",
                        "inverse-on-surface": "#f0f1f2",
                        "on-tertiary-container": "#a5aab3",
                        "inverse-surface": "#2e3132",
                        "secondary": "#455aa5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit-sm": "8px",
                        "unit-md": "16px",
                        "gutter": "24px",
                        "margin-desktop": "40px",
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "unit-xl": "48px",
                        "unit-lg": "24px",
                        "unit-xs": "4px"
                    },
                    "fontFamily": {
                        "label-sm": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-xl": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "label-md": ["Manrope"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Manrope"]
                    },
                    "fontSize": {

                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "headline-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]

    <style>
        .prism-stripe {
            background: linear-gradient(90deg, #0033A0 0%, #3456c1 50%, #98adfe 100%);
        }
    </style>
</head>

<body
    class="bg-surface text-on-surface font-body-md text-body-md antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Ambient Gradient Background -->
    <div
        class="absolute top-0 left-0 w-full h-[409px] bg-gradient-to-b from-secondary-fixed/30 to-transparent -z-10 pointer-events-none">
    </div>
    <main class="w-full max-w-md px-margin-mobile md:px-0">
        <!-- Login Card -->
        <div
            class="bg-surface-container-lowest rounded-[1rem] shadow-[0px_4px_20px_rgba(0,31,107,0.05)] border border-surface-container-high overflow-hidden relative">
            <!-- Prism Stripe Accent -->
            <div class="h-1 w-full prism-stripe"></div>
            <div class="p-8 md:p-10 flex flex-col items-center">
                <!-- Logo / Branding -->
                <div class="mb-8 text-center">
                    <h1 class="font-headline-xl text-headline-xl text-primary font-bold tracking-tight">SayerBarn</h1>
                    <p class="font-body-md text-body-md text-on-surface-variant mt-2">Bienvenido de nuevo</p>
                </div>
                <!-- Form -->
                <form class="w-full flex flex-col gap-unit-md">
                    <!-- Email Field -->
                    <div class="flex flex-col gap-unit-xs">
                        <label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Correo
                            electrónico</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline"
                                style="font-variation-settings: 'FILL' 0;">mail</span>
                            <input
                                class="w-full bg-surface-bright border border-outline-variant rounded-DEFAULT py-3 pl-10 pr-4 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors text-on-surface"
                                id="email" name="email" placeholder="tu@correo.com" required="" type="email" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="flex flex-col gap-unit-xs">
                        <label class="font-label-sm text-label-sm text-on-surface-variant"
                            for="password">Contraseña</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline"
                                style="font-variation-settings: 'FILL' 0;">lock</span>
                            <input
                                class="w-full bg-surface-bright border border-outline-variant rounded-DEFAULT py-3 pl-10 pr-4 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors text-on-surface"
                                id="password" name="password" placeholder="••••••••" required="" type="password" />
                            <button
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none"
                                type="button">
                                <span class="material-symbols-outlined"
                                    style="font-variation-settings: 'FILL' 0;">visibility_off</span>
                            </button>
                        </div>
                    </div>
                    <!-- Forgot Password Link -->
                    <div class="flex justify-end w-full mt-1 mb-2">
                        <a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors"
                            href="#">¿Olvidaste tu contraseña?</a>
                    </div>
                    <!-- Submit Button -->
                    <button
                        class="w-full bg-primary-container text-on-primary font-label-md text-label-md font-bold py-4 rounded-DEFAULT hover:bg-primary transition-colors shadow-sm hover:shadow-md mt-2 flex justify-center items-center gap-2"
                        type="submit">
                        Iniciar sesión
                        <span class="material-symbols-outlined text-[20px]"
                            style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
                    </button>
                </form>
                <!-- Divider -->
                <div class="w-full flex items-center gap-4 my-8">
                    <div class="h-px bg-outline-variant flex-1"></div>
                    <span class="font-label-sm text-label-sm text-on-surface-variant">O</span>
                    <div class="h-px bg-outline-variant flex-1"></div>
                </div>
                <!-- Sign Up Link -->
                <div class="text-center w-full">
                    <p class="font-body-md text-body-md text-on-surface">
                        ¿No tienes cuenta?
                        <a class="font-label-md text-label-md text-primary font-bold hover:underline transition-all"
                            href="#">Regístrate</a>
                    </p>
                </div>
            </div>
        </div>
        <!-- Footer / Legal Links (Optional Context) -->
        <div class="mt-8 text-center flex justify-center gap-4">
            <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
                href="#">Privacidad</a>
            <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
                href="#">Términos</a>
        </div>
    </main>
</body>

</html>
