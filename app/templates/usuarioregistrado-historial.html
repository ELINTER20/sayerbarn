{% extends 'base.html' %}
{% block title %}SayerBarn - Historial de Asesorías{% endblock %}

{% block content %}
<div class="max-w-container-max mx-auto w-full px-margin-mobile md:px-margin-desktop py-unit-xl">
    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 mb-unit-lg">
        <span class="font-label-md text-label-md text-on-surface-variant">Mi cuenta</span>
        <span class="material-symbols-outlined text-[16px] text-on-surface-variant">chevron_right</span>
        <span class="font-label-md text-label-md text-primary font-bold">Historial de asesorías</span>
    </nav>

    <div class="flex items-center gap-3 mb-unit-xl">
        <div class="bg-primary-fixed p-2 rounded-lg flex items-center justify-center">
            <span class="material-symbols-outlined text-primary text-[28px]">history</span>
        </div>
        <h1 class="font-headline-lg text-headline-lg text-primary">Historial de asesorías</h1>
    </div>

    <div id="historial-lista" class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm">
        <div class="flex justify-center items-center py-16 text-on-surface-variant">
            <span class="material-symbols-outlined text-[32px]">hourglass_empty</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    function esc(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatFecha(iso) {
        if (!iso) return '—';
        var d = new Date(iso);
        return d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
    }

    function renderAsesoria(a, isLast) {
        var nombre = esc(a.producto_nombre || 'Producto no disponible');
        var imgTag = a.imagen_url
            ? '<img alt="' + nombre + '" class="w-full h-full object-contain" src="' + esc(a.imagen_url) + '" />'
            : '<span class="material-symbols-outlined text-on-surface-variant text-[32px]">inventory_2</span>';
        var contexto = [a.superficie, a.uso].filter(Boolean).map(esc).join(' · ');
        var border = isLast ? '' : 'border-b border-outline-variant';
        return '<div class="flex flex-col md:flex-row items-center gap-6 p-unit-md hover:bg-surface-container-low transition-colors duration-200 ' + border + '">'
            + '<div class="w-full md:w-32 flex-shrink-0"><p class="font-label-md text-label-md text-on-surface-variant">' + formatFecha(a.created_at) + '</p></div>'
            + '<div class="flex-shrink-0 w-20 h-20 bg-surface rounded-lg border border-outline-variant p-2 flex items-center justify-center overflow-hidden">' + imgTag + '</div>'
            + '<div class="flex-grow">'
            + (contexto ? '<p class="font-body-md text-body-md text-on-surface-variant mb-1">' + contexto + '</p>' : '')
            + '<h3 class="font-headline-md text-headline-md text-on-surface font-bold">' + nombre + '</h3>'
            + '</div>'
            + '</div>';
    }

    async function cargar() {
        var lista = document.getElementById('historial-lista');
        try {
            var res = await fetch('/api/asesorias');
            if (!res.ok) throw new Error(res.status);
            var data = await res.json();
            if (!data.length) {
                lista.innerHTML = '<div class="flex flex-col items-center justify-center py-16 gap-3 text-on-surface-variant"><span class="material-symbols-outlined text-[48px]">history_toggle_off</span><p class="font-body-lg text-body-lg">No tienes asesorías registradas aún.</p></div>';
                return;
            }
            lista.innerHTML = data.map(function (a, i) { return renderAsesoria(a, i === data.length - 1); }).join('');
        } catch (e) {
            lista.innerHTML = '<div class="flex flex-col items-center justify-center py-16 gap-3 text-on-surface-variant"><span class="material-symbols-outlined text-[48px]">error_outline</span><p class="font-body-lg text-body-lg">Error al cargar el historial. Intenta de nuevo.</p></div>';
        }
    }

    cargar();
})();
</script>
{% endblock %}
