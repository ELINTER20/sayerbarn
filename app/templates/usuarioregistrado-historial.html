                <a class="text-on-surface-variant font-body-lg text-body-lg hover:text-primary transition-colors duration-200 cursor-pointer active:opacity-80"
                    href="{{ url_for('main.catalogo') }}">Catálogo</a>
            </nav>
            <div class="flex items-center gap-margin-sm">

                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOk26rKBbR5Al_oE9_MKnHwvpQ3_C7qEZRETTKlcA016MWwfv3IXhvcO7CsjQfBKTAR_qRrBYvqXs8JrJGEiDNSt-yIMsws2YOerPfxX-PfEyWMGWVECZ0wcJNAs3CKqvBGUPcA2EytehYpZkhkbc1HGw_u9_2YuWuNREjFyDScuf8-pSEPAmgVISs4dTpT2dPLvUoQ2jx4uynbpXzvI2nJkQD_O_lchdDgiznTTwS7q6i0lA2k97AMQafBP995Hd-GwBFjX3pFx0C" />

            <span class="font-label-md text-label-md text-primary font-bold">Historial de asesorías</span>
        </nav>
        <!-- Page Header -->
        <div class="flex items-center gap-3 mb-margin-lg">
            <div class="bg-primary-fixed p-2 rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-[28px]">history</span>
            </div>
            <h1 class="font-headline-lg text-headline-lg text-primary">Historial de asesorías</h1>
        </div>
        <!-- History List Container -->
        <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm">
            <div id="historial-list" class="min-h-[240px]"></div>
            <div id="historial-message" class="p-margin-md font-body-md text-body-md text-on-surface-variant">Cargando historial...</div>

                <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
                    href="#">Términos y Condiciones</a>

                    href="#">Avisos Legales</a>
            </div>
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const historialList = document.getElementById('historial-list');
            const historialMessage = document.getElementById('historial-message');

            function formatDate(isoDate) {
                if (!isoDate) return 'Fecha desconocida';
                const date = new Date(isoDate);
                return date.toLocaleDateString('es-ES', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }

            function crearEntrada(asesoria) {
                const card = document.createElement('div');
                card.className = 'flex flex-col md:flex-row items-center gap-6 p-margin-md hover:bg-surface-container-low transition-colors duration-200 border-b border-outline-variant group';

                const fecha = document.createElement('div');
                fecha.className = 'w-full md:w-32 flex-shrink-0';
                fecha.innerHTML = `<p class="font-label-md text-label-md text-on-surface-variant">${formatDate(asesoria.fecha)}</p>`;

                const imagenContenedor = document.createElement('div');
                imagenContenedor.className = 'flex-shrink-0 w-20 h-20 bg-surface rounded-lg border border-outline-variant p-2 flex items-center justify-center overflow-hidden';
                const imagen = document.createElement('img');
                imagen.alt = asesoria.producto_recomendado || 'Producto recomendado';
                imagen.className = 'w-full h-full object-contain';
                imagen.src = asesoria.imagen_url || 'https://via.placeholder.com/120?text=Sin+imagen';
                imagenContenedor.appendChild(imagen);

                const contenido = document.createElement('div');
                contenido.className = 'flex-grow';
                const descripcion = document.createElement('p');
                descripcion.className = 'font-body-md text-body-md text-on-surface-variant mb-1';
                descripcion.textContent = asesoria.resultado || 'Asesoría sin descripción adicional.';
                const titulo = document.createElement('h3');
                titulo.className = 'font-headline-sm text-headline-sm text-on-surface font-bold';
                titulo.textContent = asesoria.producto_recomendado || 'Producto recomendado no disponible';
                contenido.appendChild(descripcion);
                contenido.appendChild(titulo);

                card.appendChild(fecha);
                card.appendChild(imagenContenedor);
                card.appendChild(contenido);

                return card;
            }

            async function cargarHistorial() {
                try {
                    const response = await fetch('/api/asesorias', { credentials: 'include' });
                    if (response.status === 401) {
                        historialMessage.textContent = 'Necesitas iniciar sesión para ver tu historial.';
                        return;
                    }
                    if (!response.ok) {
                        throw new Error('Error en la respuesta del servidor');
                    }

                    const asesorias = await response.json();
                    historialList.innerHTML = '';

                    if (!asesorias.length) {
                        historialMessage.textContent = 'Aún no tienes asesorías en tu historial.';
                        return;
                    }

                    historialMessage.textContent = '';
                    asesorias.forEach(asesoria => {
                        historialList.appendChild(crearEntrada(asesoria));
                    });
                } catch (error) {
                    console.error(error);
                    historialMessage.textContent = 'No se pudo cargar el historial. Recarga la página e inténtalo de nuevo.';
                }
            }

            cargarHistorial();
        });
    </script>
</body>
