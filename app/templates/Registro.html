<!DOCTYPE html>

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SayerBarn - Crea tu cuenta</title>

    <link

    <script id="tailwind-config">

                        "on-surface": "#191c1d",
                        "surface-container-high": "#e7e8e9",
                        "secondary-container": "#98adfe",
                        "outline-variant": "#c4c5d5",
                        "primary": "#00216e",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#3456c1",
                        "tertiary": "#232930",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#133ca8",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#b6c4ff",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e1e3e4",
                        "surface": "#f8f9fa",

    <style>
        .prism-stripe {
            background: linear-gradient(90deg, 
                #0033A0 0%, #E3000F 12.5%, #F37021 25%, #FFD100 37.5%, 
                #009A44 50%, #0033A0 62.5%, #E3000F 75%, #F37021 87.5%, #FFD100 100%);
            background-size: 200% 100%;
            animation: prism-walk 4s linear infinite;
        }
        @keyframes prism-walk {
            0%   { background-position: 0% 0; }
            100% { background-position: -200% 0; }
        }
        .btn-lift {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0px 8px 24px rgba(0, 31, 107, 0.25) !important;
        }
        .btn-lift:active {
            transform: translateY(-2px);
        }
    </style>
</head>

<body
    class="bg-surface-bright min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden font-body-md text-on-surface">
    <!-- Subtle Blue Gradient Background Effect -->
    <div
        class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-primary-fixed-dim/20 to-transparent pointer-events-none">
    </div>
    <!-- Main Registration Card -->
    <main
        class="w-full max-w-[480px] bg-surface-container-lowest rounded-[1rem] shadow-[0px_4px_20px_rgba(0,31,107,0.05)] border border-surface-container relative z-10 overflow-hidden">
        <!-- Prism Stripe Accent -->
        <div class="h-1 w-full prism-stripe"></div>
        <div class="p-unit-xl">
            <!-- Brand Logo / Name -->
            <div class="text-center mb-unit-lg">
                <h1 class="font-headline-xl text-headline-xl text-primary mb-unit-xs">SayerBarn</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Expertos en color y protección</p>
            </div>
            <!-- Title -->
            <h2 class="font-headline-md text-headline-md text-on-surface mb-unit-lg text-center">Crea tu cuenta</h2>
            <!-- Registration Form -->
            <form action="{{ url_for('main.registro') }}" class="space-y-unit-md" method="POST">
                <!-- Full Name -->
                <div>
                    <label class="block font-label-sm text-label-sm text-on-surface-variant mb-unit-xs uppercase"
                        for="nombre">Nombre completo</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline-variant"
                                data-icon="person">person</span>
                        </div>
                        <input
                            class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline transition-colors"
                            id="nombre" name="nombre" placeholder="Tu nombre" required="" type="text" value="{{ nombre|default('') }}" />
                    </div>
                </div>
                <!-- Email -->
                <div>
                    <label class="block font-label-sm text-label-sm text-on-surface-variant mb-unit-xs uppercase"
                        for="email">Correo electrónico</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline-variant" data-icon="mail">mail</span>
                        </div>
                        <input
                            class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline transition-colors"
                            id="email" name="email" placeholder="ejemplo@correo.com" required="" type="email" value="{{ email|default('') }}" />
                    </div>
                </div>
                <!-- Password -->
                <div>
                    <label class="block font-label-sm text-label-sm text-on-surface-variant mb-unit-xs uppercase"
                        for="password">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline-variant" data-icon="lock">lock</span>
                        </div>
                        <input
                            class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline transition-colors"
                            id="password" name="password" placeholder="Mínimo 8 caracteres" required=""
                            type="password" />
                    </div>
                </div>
                <!-- Confirm Password -->
                <div>
                    <label class="block font-label-sm text-label-sm text-on-surface-variant mb-unit-xs uppercase"
                        for="confirmPassword">Confirmar contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline-variant" data-icon="lock">lock</span>
                        </div>
                        <input
                            class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline transition-colors"
                            id="confirmPassword" name="confirmPassword" placeholder="Repite tu contraseña" required=""
                            type="password" />
                    </div>
                </div>
                <!-- Error Message -->
                {% if error %}
                <div class="bg-error-container text-on-error-container font-body-md text-body-md px-4 py-3 rounded-lg">
                    {{ error }}
                </div>
                {% endif %}
                <!-- Submit Button -->
                <div class="pt-unit-sm">
                    <button
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md font-bold text-on-primary bg-primary-container hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200 btn-lift"
                        type="submit">
                        Crear cuenta
                    </button>
                </div>
            </form>
            <!-- Login Link -->
            <div class="mt-unit-lg text-center">
                <p class="font-body-md text-body-md text-on-surface-variant">
                    ¿Ya tienes cuenta?
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors"
                        href="{{ url_for('main.login') }}">Inicia sesión</a>
                </p>
            </div>
            <!-- Terms -->
            <div class="mt-unit-md text-center">
                <p class="font-label-sm text-label-sm text-outline font-normal">
                    Al crear una cuenta, aceptas nuestros <a class="underline hover:text-primary" href="#">Términos de
                        servicio</a> y <a class="underline hover:text-primary" href="#">Política de privacidad</a>.
                </p>
            </div>
        </div>
    </main>
</body>

</html>
