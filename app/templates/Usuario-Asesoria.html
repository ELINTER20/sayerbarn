<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SayerBarn - Asesoría</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Manrope:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#191c1d",
                        "on-background": "#191c1d",
                        "on-surface-variant": "#444653",
                        "tertiary-fixed": "#dee3ed",
                        "tertiary": "#232930",
                        "on-tertiary": "#ffffff",
                        "background": "#f8f9fa",
                        "inverse-primary": "#b6c4ff",
                        "on-primary-fixed-variant": "#133ca8",
                        "on-tertiary-fixed": "#161c23",
                        "inverse-surface": "#2e3132",
                        "error": "#ba1a1a",
                        "surface": "#f8f9fa",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#b6c4ff",
                        "primary-container": "#0033a0",
                        "surface-container-highest": "#e1e3e4",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e1e3e4",
                        "tertiary-container": "#393f47",
                        "outline-variant": "#c4c5d5",
                        "on-secondary-container": "#283e88",
                        "secondary-fixed-dim": "#b6c4ff",
                        "on-secondary": "#ffffff",
                        "primary": "#00216e",
                        "outline": "#747684",
                        "on-secondary-fixed-variant": "#2b418c",
                        "on-primary-fixed": "#001550",
                        "on-error-container": "#93000a",
                        "secondary": "#455aa5",
                        "on-secondary-fixed": "#001550",
                        "on-tertiary-fixed-variant": "#41474f",
                        "surface-dim": "#d9dadb",
                        "inverse-on-surface": "#f0f1f2",
                        "primary-fixed": "#dce1ff",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-container": "#a5aab3",
                        "surface-tint": "#3456c1",
                        "tertiary-fixed-dim": "#c1c7d0",
                        "surface-bright": "#f8f9fa",
                        "surface-container": "#edeeef",
                        "surface-container-high": "#e7e8e9",
                        "secondary-container": "#98adfe",
                        "secondary-fixed": "#dce1ff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#8ea6ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit-lg": "24px",
                        "container-max": "1280px",
                        "unit-md": "16px",
                        "unit-xs": "4px",
                        "unit-sm": "8px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "unit-xl": "48px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Manrope"],
                        "label-md": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "headline-xl": ["Hanken Grotesk"],
                        "body-md": ["Manrope"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .prism-stripe {
            background: linear-gradient(90deg, #0033A0 0%, #3456c1 50%, #8ea6ff 100%);
        }

        .soft-ambient-shadow {
            box-shadow: 0px 4px 20px rgba(0, 31, 107, 0.05);
        }
    </style>
</head>

<body class="bg-background flex flex-col min-h-screen text-on-background font-body-md">
    <!-- TopNavBar -->
    <nav
        class="bg-surface-container-lowest dark:bg-inverse-surface w-full sticky top-0 z-50 border-b-2 border-primary/10 shadow-sm">
        <div
            class="flex justify-between items-center h-20 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">
            <!-- Brand -->
            <a class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity"
                href="#">
                SayerBarn
            </a>
            <!-- Navigation Links (Desktop) -->
            <div class="hidden md:flex items-center gap-unit-lg">
                <a class="font-label-md text-label-md text-on-surface-variant dark:text-surface-variant hover:text-primary transition-colors hover:bg-surface-container-high/50 dark:hover:bg-surface-container-highest/20 px-3 py-2 rounded-md"
                    href="#">Inicio</a>
                <!-- Active Item: Asesoría -->
                <a class="font-label-md text-label-md text-primary dark:text-primary-fixed border-b-2 border-primary dark:border-primary-fixed pb-1 hover:bg-surface-container-high/50 dark:hover:bg-surface-container-highest/20 px-3 py-2 rounded-md"
                    href="#">Asesoría</a>
                <a class="font-label-md text-label-md text-on-surface-variant dark:text-surface-variant hover:text-primary transition-colors hover:bg-surface-container-high/50 dark:hover:bg-surface-container-highest/20 px-3 py-2 rounded-md"
                    href="#">Catálogo</a>
            </div>
            <!-- Actions -->
            <div class="flex items-center gap-unit-sm">
                <a class="hidden md:flex font-label-md text-label-md text-primary hover:bg-surface-container-high/50 px-4 py-2 rounded-lg transition-colors"
                    href="#">
                    Iniciar sesión
                </a>
                <a class="font-label-md text-label-md bg-primary text-on-primary px-5 py-2.5 rounded-lg hover:bg-primary-container transition-colors scale-95 active:scale-90 shadow-sm"
                    href="#">
                    Registrarse
                </a>
                <!-- Mobile Menu Toggle (Decorative for structural completeness) -->
                <button class="md:hidden p-2 text-on-surface-variant">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
        <!-- Optional subtle bottom accent line -->
        <div class="w-full h-[2px] prism-stripe absolute bottom-0 left-0"></div>
    </nav>
    <!-- Main Content Canvas -->
    <main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
        <!-- Onboarding Question Card -->
        <div
            class="w-full max-w-2xl bg-surface-container-lowest rounded-xl soft-ambient-shadow overflow-hidden relative">
            <!-- Progress Bar -->
            <div class="w-full h-1 bg-surface-variant absolute top-0 left-0">
                <div class="h-full bg-primary-container w-1/4 transition-all duration-500 rounded-r-full"></div>
            </div>
            <div class="p-unit-lg md:p-unit-xl">
                <!-- Header area with Back button -->
                <div class="flex items-center mb-unit-lg">
                    <button aria-label="Volver"
                        class="text-on-surface-variant hover:text-primary transition-colors p-2 -ml-2 rounded-full hover:bg-surface-container-high">
                        <span class="material-symbols-outlined"
                            style="font-variation-settings: 'FILL' 0;">arrow_back</span>
                    </button>
                    <span class="ml-2 font-label-sm text-label-sm text-outline uppercase tracking-wider">Paso 1 de
                        4</span>
                </div>
                <!-- Question -->
                <h1
                    class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-unit-xl">
                    ¿Qué superficie vas a tratar?
                </h1>
                <!-- Options Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-unit-md mb-unit-xl">
                    <!-- Option: Madera -->
                    <label class="cursor-pointer group">
                        <input class="peer sr-only" name="surface" type="radio" value="madera" />
                        <div
                            class="bg-surface-container-lowest border-2 border-outline-variant rounded-lg p-unit-lg flex flex-col items-center justify-center gap-unit-sm text-center transition-all duration-200 peer-checked:border-primary peer-checked:bg-surface-container-low hover:border-primary hover:shadow-sm">
                            <span
                                class="material-symbols-outlined text-[32px] text-on-surface-variant group-hover:text-primary transition-colors">nature</span>
                            <span class="font-body-lg text-body-lg text-on-surface font-semibold">Madera</span>
                        </div>
                    </label>
                    <!-- Option: Metal -->
                    <label class="cursor-pointer group">
                        <input class="peer sr-only" name="surface" type="radio" value="metal" />
                        <div
                            class="bg-surface-container-lowest border-2 border-outline-variant rounded-lg p-unit-lg flex flex-col items-center justify-center gap-unit-sm text-center transition-all duration-200 peer-checked:border-primary peer-checked:bg-surface-container-low hover:border-primary hover:shadow-sm">
                            <span
                                class="material-symbols-outlined text-[32px] text-on-surface-variant group-hover:text-primary transition-colors">precision_manufacturing</span>
                            <span class="font-body-lg text-body-lg text-on-surface font-semibold">Metal</span>
                        </div>
                    </label>
                    <!-- Option: Concreto -->
                    <label class="cursor-pointer group">
                        <input class="peer sr-only" name="surface" type="radio" value="concreto" />
                        <div
                            class="bg-surface-container-lowest border-2 border-outline-variant rounded-lg p-unit-lg flex flex-col items-center justify-center gap-unit-sm text-center transition-all duration-200 peer-checked:border-primary peer-checked:bg-surface-container-low hover:border-primary hover:shadow-sm">
                            <span
                                class="material-symbols-outlined text-[32px] text-on-surface-variant group-hover:text-primary transition-colors">foundation</span>
                            <span class="font-body-lg text-body-lg text-on-surface font-semibold">Concreto</span>
                        </div>
                    </label>
                    <!-- Option: Otro -->
                    <label class="cursor-pointer group">
                        <input class="peer sr-only" name="surface" type="radio" value="otro" />
                        <div
                            class="bg-surface-container-lowest border-2 border-outline-variant rounded-lg p-unit-lg flex flex-col items-center justify-center gap-unit-sm text-center transition-all duration-200 peer-checked:border-primary peer-checked:bg-surface-container-low hover:border-primary hover:shadow-sm">
                            <span
                                class="material-symbols-outlined text-[32px] text-on-surface-variant group-hover:text-primary transition-colors">category</span>
                            <span class="font-body-lg text-body-lg text-on-surface font-semibold">Otro</span>
                        </div>
                    </label>
                </div>
                <!-- Custom Input Area -->
                <div class="relative mt-unit-md">
                    <div aria-hidden="true" class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-surface-variant"></div>
                    </div>
                    <div class="relative flex justify-center">
                        <span
                            class="bg-surface-container-lowest px-4 font-label-sm text-label-sm text-outline uppercase tracking-wider">O
                            especifica</span>
                    </div>
                </div>
                <div class="mt-unit-md">
                    <input
                        class="w-full bg-surface-bright border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg p-4 focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-outline focus:outline-none"
                        placeholder="O escribe tu respuesta aquí..." type="text" />
                </div>
            </div>
            <!-- Bottom Actions / Next Button (Implied for UX completeness, though not strictly in prompt, adds to SaaS feel) -->
            <div
                class="bg-surface-container-low px-unit-lg py-unit-md flex justify-end items-center border-t border-surface-variant">
                <button
                    class="font-label-md text-label-md bg-primary text-on-primary px-6 py-3 rounded-lg hover:bg-primary-container transition-colors shadow-sm flex items-center gap-2">
                    Continuar
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </button>
            </div>
        </div>
    </main>
    <!-- Footer -->
    <footer class="bg-primary dark:bg-tertiary w-full py-unit-xl mt-auto border-t-4 border-primary-container">
        <div
            class="grid grid-cols-1 md:grid-cols-4 gap-gutter px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">
            <!-- Brand & Copyright -->
            <div class="col-span-1 md:col-span-2 flex flex-col gap-unit-md">
                <span class="font-headline-sm text-headline-sm font-bold text-on-primary">SayerBarn</span>
                <p class="font-body-md text-body-md text-on-primary opacity-80">
                    © 2024 SayerBarn. Sayer Dabet Branding.
                </p>
            </div>
            <!-- Links -->
            <div class="col-span-1 md:col-span-2 flex flex-col sm:flex-row gap-unit-md sm:gap-unit-xl justify-end">
                <div class="flex flex-col gap-unit-sm">
                    <a class="font-body-md text-body-md text-primary-fixed-dim/80 hover:text-primary-fixed hover:underline decoration-secondary-container opacity-80 hover:opacity-100 transition-all"
                        href="#">Contacto</a>
                    <a class="font-body-md text-body-md text-primary-fixed-dim/80 hover:text-primary-fixed hover:underline decoration-secondary-container opacity-80 hover:opacity-100 transition-all"
                        href="#">Aviso de Privacidad</a>
                </div>
                <div class="flex flex-col gap-unit-sm">
                    <a class="font-body-md text-body-md text-primary-fixed-dim/80 hover:text-primary-fixed hover:underline decoration-secondary-container opacity-80 hover:opacity-100 transition-all"
                        href="#">Términos y Condiciones</a>
                    <a class="font-body-md text-body-md text-primary-fixed-dim/80 hover:text-primary-fixed hover:underline decoration-secondary-container opacity-80 hover:opacity-100 transition-all"
                        href="#">Sucursales</a>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
