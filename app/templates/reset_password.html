{% extends 'base_auth.html' %}

{% block title %}Restablecer contraseña{% endblock %}

{% block content %}
<main class="w-full max-w-md mx-auto">

    <h2 class="text-2xl font-bold mb-4">
        Restablecer contraseña
    </h2>

    {% if error %}
    <div class="bg-error-container text-on-error-container font-body-md text-body-md px-4 py-3 rounded-lg mb-4">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('main.reset_password', token=token) }}">
        <input
            type="password"
            name="password"
            placeholder="Nueva contraseña"
            required
            class="w-full border p-3 rounded mb-4">

        <input
            type="password"
            name="confirmPassword"
            placeholder="Repite la contraseña"
            required
            class="w-full border p-3 rounded mb-4">

        <button
            type="submit"
            class="w-full bg-blue-600 text-white p-3 rounded">
            Cambiar contraseña
        </button>
    </form>

    <p class="mt-4 text-center text-on-surface-variant text-sm">
        <a class="text-primary hover:underline" href="{{ url_for('main.login') }}">Volver al inicio de sesión</a>
    </p>

</main>
{% endblock %}
